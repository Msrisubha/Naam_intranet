<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background:  #0056b3;
    color: white;
    padding: 2PX;
    text-align: center;
}


/* FORM */
.container {
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 6px;
}

input, select, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background: #0056b3;
    color: white;
    border: none;
    cursor: pointer;
}
.suggestions-box {
    border: 1px solid #ccc;
    max-height: 150px;
    overflow-y: auto;
    background: white;
}

.suggestions-box div {
    padding: 8px;
    cursor: pointer;
}

.suggestions-box div:hover {
    background: #f0f0f0;
}
.footer {
    background: #1A428A;
    color: white;
    text-align: center;
    padding: 10px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>
</head>

<body>

    <!-- DEPARTMENT -->

<option value="MAINTENANCE/FACILITIES">MAINTENANCE/FACILITIES</option>
<option value="MAMMOGRAPHY">MAMMOGRAPHY</option>
<option value="MEDICAL_GAS_MANIFOLD_ROOM">MEDICAL_GAS_MANIFOLD_ROOM</option>
<option value="MRI_ROOM">MRI_ROOM</option>
<option value="NEONTAL_ICU(NICU)">NEONTAL_ICU(NICU)</option>
<option value="NURSING_STATION">NURSING_STATION</option>

<option value="SECURITY">SECURITY</option>
<option value="ULTRASOUND_ROOM">ULTRASOUND_ROOM</option>
    </select>

    <!-- PERSON -->
    <label>To (Person)</label>
    <select id="userList">
        <option>Select Person</option>
    </select>

    <!-- SUBJECT -->
    <label>Subject</label>
    <input type="text" id="subject">

    <!-- MESSAGE -->
    <label>Message</label>
    <textarea id="message"></textarea>

    <!-- FILE -->
    <label>Upload File</label>
    <input type="file" id="file">

    <!-- SEND -->
    <button onclick="sendMessage()">Send</button>

</div>

<script>

/* ✅ AUTO FILL FROM USER (from login) */
const loggedUser = localStorage.getItem("username") || "Employee";
document.getElementById("fromUser").value = loggedUser;

/* ✅ USERS BY DEPARTMENT */
const users = {
  OPERATION:["Sachin Kumar.R"],
  BIOMEDICAL_ENGINEERING: ["Shanmugam.S"],
  BLOOD_BANK: [""],
  CASUALTY_EMERGENCY: ["velmurgan.A"],
  CATH_LAB: ["Sarvanan.A"],
  CCTV_CONTROL_ROOM: ["Arulmani.K"],
  CENTRAL_STORE: ["Kanan.K"],
  CSSD_STERILE_SERVICES: ["vijayarani.k"],
  DIALYSIS_UNIT: ["Sacho.P"],
  ENDOSCOPY_UNIT: [""],
  FINANCE_ACCOUNTS: ["Venkatesan.K"],
  FRONT_OFFICE_REGISTRATION: ["Jayapragathi.J"],
  GENERAL_WARDS: ["Kalaiarasi.S"],

  KITCHEN_DIETARY: ["Monika.S"],
  LABORATORY_PROCESSING: ["Balamurugan.T"],
  LABORATORY_SAMPLE_COLLECTION: ["Balamurugan.T"],
  LAUNDARY: ["Kannammal.C"],
  MAINTENANCE_FACILITIES: ["Maniyarasu.M"],
  MAMMOGRAPHY: [""],
  MEDICAL_GAS_MANIFOLD_ROOM: ["Vinushankar.M"],
  MRI_ROOM: [""],
  NEONTAL_ICU_NICU: [""],
  NURSING_STATION: ["Kalairasi.S"],
  OPD_CONSULTATION_ROOMS: ["Ruby.L"],
  OPERATION_THEATRE_OT: ["Vijayarani.K"],
  PHARMACHY_IP: ["Mohan.A"],
  PHARMACHY_OP: ["Mohan.A"],
  UALITY_NABH: [""],
  RADIOLOGY: ["Ragul.S"],
  SECURITY: ["Sarvanan.R"],
  ULTRASOUND_ROOM: ["Saroja.G"],
};

function loadUsers() {
    const dept = document.getElementById("department").value;
    const userList = document.getElementById("userList");

    userList.innerHTML = "<option>Select Person</option>";

    if (users[dept]) {
        users[dept].forEach(u => {
            let option = document.createElement("option");
            option.text = u;
            userList.add(option);
        });
    }
}

/* ✅ SEND FUNCTION */
function sendMessage() {
    const to = document.getElementById("userList").value;
    const subject = document.getElementById("subject").value;

    if (to === "" || subject === "") {
        alert("Fill all details");
        return;
    }

    alert("Message Sent Successfully!");
}

</script>
